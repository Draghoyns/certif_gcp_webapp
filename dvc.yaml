stages:
  parse:
    cmd: uv run parse.py
    params:
      - params.yaml:
          - category_tags
    deps:
      - parse.py
      - parse_pdf.py
      - parse_csv.py
      - raw_data/
    outs:
      - gcp-mle-quiz/public/data/questions.json:
          cache: true
          persist: true   # keep on disk after dvc repro; don't delete between runs
