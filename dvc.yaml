stages:
  parse:
    cmd: uv run scripts/parsers/parse.py
    params:
      - params.yaml:
          - certification_type
          - mle_tags
          - de_tags
    deps:
      - scripts/parsers/parse.py
      - scripts/parsers/parse_pdf.py
      - scripts/parsers/parse_csv.py
      - gcp-mle-quiz/public/raw_data/
    outs:
      - gcp-mle-quiz/public/data/questions.json:
          cache: true
          persist: true   # keep on disk after dvc repro; don't delete between runs
